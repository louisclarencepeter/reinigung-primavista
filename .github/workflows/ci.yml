name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      - run: npm ci                       # root deps (mongoose) for the function
      - run: npm ci --prefix client
      - run: npm run build --prefix client
      - name: Smoke-check the Netlify Function loads
        run: node --input-type=module -e "await import('./netlify/functions/contact.mjs'); console.log('contact.mjs OK')"
