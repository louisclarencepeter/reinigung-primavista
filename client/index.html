<script>
window.__pvMenuHydrated = false;
(function(){
  function setMenu(open){
    var button = document.querySelector('.menu-toggle');
    var nav = document.getElementById('mobile-nav');
    if (!button || !nav) return;
    button.classList.toggle('is-open', open);
    button.setAttribute('aria-expanded', open ? 'true' : 'false');
    button.setAttribute('aria-label', open ? 'Menü schließen' : 'Menü öffnen');
    nav.classList.toggle('open', open);
    nav.setAttribute('aria-hidden', open ? 'false' : 'true');
    document.body.classList.toggle('mobile-menu-open', open);
  }
  document.addEventListener('click', function(e){
    if (window.__pvMenuHydrated) return;
    var button = e.target.closest && e.target.closest('.menu-toggle');
    if (!button) return;
    e.preventDefault();
    setMenu(button.getAttribute('aria-expanded') !== 'true');
  });
  document.addEventListener('keydown', function(e){
    if (window.__pvMenuHydrated || e.key !== 'Escape') return;
    setMenu(false);
  });
})();
</script>
